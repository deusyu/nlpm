name: nlpm-check

# Runs the NLPM standalone validator on every push and pull request.
# Catches manifest-vs-disk inconsistencies, missing frontmatter, and
# miscapitalized hook event names — the bug classes that ship in
# practice even with the official plugin-validator passing.
#
# On push to the default branch, also regenerates nlpm-badge.json so
# the "Validated by NLPM" badge in your README stays fresh.
#
# To adopt: copy this file to .github/workflows/nlpm-check.yml in your
# plugin repo. Commit. No secrets required.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write   # needed only for the badge-publish step on push to main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch NLPM binaries
        run: |
          curl -fsSL -o /usr/local/bin/nlpm-check \
            https://raw.githubusercontent.com/xiaolai/nlpm/main/bin/nlpm-check
          curl -fsSL -o /usr/local/bin/nlpm-badge \
            https://raw.githubusercontent.com/xiaolai/nlpm/main/bin/nlpm-badge
          chmod +x /usr/local/bin/nlpm-check /usr/local/bin/nlpm-badge
          nlpm-check --version

      - name: Run nlpm-check
        id: check
        run: |
          set +e
          nlpm-check --json . > /tmp/nlpm-result.json
          CHECK_EXIT=$?
          set -e
          # Always render the human report for the log; preserve the exit code for the gate
          nlpm-check . || true
          echo "exit_code=$CHECK_EXIT" >> "$GITHUB_OUTPUT"
          exit $CHECK_EXIT

      - name: Generate and commit badge
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && always()
        run: |
          # Even on a failing check, regenerate the badge so it surfaces the
          # current state. The check step's exit code blocks the workflow; the
          # badge step uses always() to render the red badge as well.
          if [ ! -f /tmp/nlpm-result.json ]; then
            # The check step crashed before producing JSON. Skip badge update.
            echo "No result JSON; skipping badge regeneration."
            exit 0
          fi
          nlpm-badge < /tmp/nlpm-result.json > nlpm-badge.json
          if git diff --quiet nlpm-badge.json; then
            echo "nlpm-badge.json unchanged; nothing to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add nlpm-badge.json
          git commit -m "chore: refresh nlpm-badge.json"
          git push

      # To also fail on medium/low findings, replace the check step with:
      #   nlpm-check --strict .

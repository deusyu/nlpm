name: Validate site build

# PR-level gate: run `bash site/build.sh` against every PR that touches a
# site input and fail if VitePress build errors. Catches dead links,
# broken Mermaid, missing canonical sources, and similar breakage BEFORE
# the bad commit lands on main. Without this gate, breakage only surfaces
# when deploy-site.yml runs post-merge, leaving main red.
#
# Runs on PRs from forks (no secrets needed; the build itself is read-only).
# Mirrors deploy-site.yml's setup so a green validate run means a green
# deploy run.

on:
  pull_request:
    branches: [main]
    paths:
      # Same set deploy-site.yml watches — any change that would re-deploy
      # should also re-validate.
      - 'site/**'
      - 'bin/nlpm-build-docs'
      - 'bin/nlpm-build-reference-md'
      - 'bin/nlpm-build-vocab-data'
      - 'bin/nlpm-build-case-studies-index'
      - 'bin/nlpm-build-site-report-pages'
      - 'skills/nlpm/rules/SKILL.md'
      - 'skills/nlpm/vocabulary/SKILL.md'
      - 'skills/nlpm/scoring/SKILL.md'
      - 'skills/nlpm/conventions/SKILL.md'
      - 'analysis/vocabulary-design-principles.md'
      - 'agents/vocab-drift-scanner.md'
      - 'commands/**'
      - 'agents/**'
      - 'auditor/reports/**'
      - 'auditor/case-studies/**'
      - 'auditor/exemplars/**'
      - 'templates/report/**'
      - 'PRIVACY.md'
      - '.github/workflows/site-validate.yml'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node + pnpm
        # Match deploy-site.yml exactly — same runner default Node,
        # same pnpm version. A green validate run is meant to predict
        # a green deploy run.
        run: |
          node --version
          npm install -g pnpm@10
          pnpm --version

      - name: Build site
        run: bash site/build.sh

      - name: Confirm dist tree
        # build.sh should produce site/.vitepress/dist; a missing tree
        # means the build silently succeeded with no output (which is a
        # build.sh bug worth surfacing here).
        run: |
          DIST="$GITHUB_WORKSPACE/site/.vitepress/dist"
          if [ ! -d "$DIST" ]; then
            echo "::error::dist tree missing at $DIST"
            exit 1
          fi
          # Use `find` instead of `ls` so filenames with spaces or
          # non-alphanumeric chars don't confuse the count (shellcheck
          # SC2012). `-mindepth 1 -maxdepth 1` is the equivalent of
          # listing the top-level entries.
          ENTRIES=$(find "$DIST" -mindepth 1 -maxdepth 1 | wc -l)
          if [ "$ENTRIES" -eq 0 ]; then
            echo "::error::dist tree empty at $DIST"
            exit 1
          fi
          echo "dist entries: $ENTRIES"

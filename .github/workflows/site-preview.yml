name: Deploy PR preview

# Per-PR preview of the VitePress site, served at
# https://nlpm.com/_pr/<PR-NUMBER>/.
#
# Triggers only for PRs from branches in the same repo (not from forks):
# the workflow needs `contents: write` on gh-pages and an authenticated
# GitHub token, neither of which fork PRs get from `pull_request` by
# default. Fork PRs are still validated by site-validate.yml.
#
# Architecture:
#   - Build with SITE_BASE=/_pr/<n>/ so all absolute paths resolve under
#     the subdirectory on gh-pages.
#   - Push dist into _pr/<n>/ on gh-pages, leaving the rest of the site
#     untouched. Production lives at root; previews live in subdirs.
#   - Post a sticky PR comment (marker-tagged) with the preview URL.
#   - Cleanup is handled by site-preview-cleanup.yml on PR close.
#
# No Cloudflare purge: preview paths are brand-new on first push, so
# there is no stale cache to invalidate. Subsequent pushes overwrite
# the same files at the same path; CF may serve stale content for up
# to a few minutes. Acceptable for a preview channel; not for prod.

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]
    paths:
      - 'site/**'
      - 'bin/nlpm-build-docs'
      - 'bin/nlpm-build-reference-md'
      - 'bin/nlpm-build-vocab-data'
      - 'bin/nlpm-build-case-studies-index'
      - 'bin/nlpm-build-site-report-pages'
      - 'skills/nlpm/rules/SKILL.md'
      - 'skills/nlpm/vocabulary/SKILL.md'
      - 'skills/nlpm/scoring/SKILL.md'
      - 'skills/nlpm/conventions/SKILL.md'
      - 'analysis/vocabulary-design-principles.md'
      - 'agents/vocab-drift-scanner.md'
      - 'commands/**'
      - 'agents/**'
      - 'auditor/reports/**'
      - 'auditor/case-studies/**'
      - 'auditor/exemplars/**'
      - 'templates/report/**'
      - 'PRIVACY.md'
      - '.github/workflows/site-preview.yml'

permissions:
  contents: write
  pull-requests: write

concurrency:
  # One in-flight preview per PR; later pushes cancel earlier ones.
  group: site-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Skip fork PRs — they cannot receive a write token for gh-pages.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PREVIEW_BASE: /_pr/${{ github.event.pull_request.number }}/
      PREVIEW_URL: https://nlpm.com/_pr/${{ github.event.pull_request.number }}/
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node + pnpm
        run: |
          node --version
          npm install -g pnpm@10
          pnpm --version

      - name: Build site with preview base
        env:
          SITE_BASE: ${{ env.PREVIEW_BASE }}
        run: bash site/build.sh

      - name: Confirm dist tree
        run: |
          DIST="$GITHUB_WORKSPACE/site/.vitepress/dist"
          if [ ! -d "$DIST" ] || [ -z "$(ls -A "$DIST")" ]; then
            echo "::error::dist tree missing or empty at $DIST"
            exit 1
          fi

      - name: Push preview into gh-pages under _pr/${{ env.PR_NUMBER }}/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DIST="$GITHUB_WORKSPACE/site/.vitepress/dist"
          SUBPATH="_pr/${PR_NUMBER}"

          # Fetch + worktree gh-pages.
          git fetch origin gh-pages:gh-pages 2>/dev/null || \
            git branch gh-pages origin/gh-pages 2>/dev/null || true

          WT=$(mktemp -d)
          git worktree add "$WT" gh-pages

          # Replace only the per-PR subdirectory. The root of gh-pages
          # (production site) is untouched. The `${SUBPATH:?}` guard
          # prevents an empty SUBPATH from expanding the `rm -rf` to the
          # worktree root (shellcheck SC2115).
          rm -rf "$WT/${SUBPATH:?}"
          mkdir -p "$WT/$SUBPATH"
          cp -R "$DIST/." "$WT/$SUBPATH/"

          cd "$WT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add -A "$SUBPATH"
          if git diff --cached --quiet; then
            echo "Preview unchanged; nothing to push."
            exit 0
          fi
          git commit -m "preview: PR #${PR_NUMBER} ($(date -u +%Y-%m-%dT%H:%M:%SZ))"

          # Retry on concurrent gh-pages push (other workflows write to
          # this branch too — deploy-site, render-dashboard, etc.).
          for i in 1 2 3 4 5; do
            if git push origin gh-pages 2>&1; then break; fi
            echo "Push attempt $i failed — pulling + retrying"
            git pull --rebase origin gh-pages || true
            [ "$i" -eq 5 ] && { echo "::error::push failed after 5 attempts"; exit 1; }
          done

          cd "$GITHUB_WORKSPACE"
          git worktree remove "$WT" --force

      - name: Post or update PR comment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            const marker = '<!-- nlpm-preview-comment -->';
            const url = process.env.PREVIEW_URL;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              marker,
              `### 🔍 Preview deploy`,
              ``,
              `**Preview URL:** ${url}`,
              ``,
              `Built from \`${sha}\` at ${new Date().toISOString()}.`,
              ``,
              `It may take 30–60s for the GitHub Pages CDN to serve the new content. The preview is removed automatically when the PR closes.`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
